<!DOCTYPE html>
<html>
<head>
<title>Question</title>

<style>

body{
  font-family: Arial;
  text-align: center;
  margin-top: 120px;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  overflow:hidden;
}

h1{
  color:white;
  text-shadow:2px 2px 5px black;
}

button{
  padding:12px 25px;
  font-size:18px;
  margin:10px;
  border:none;
  border-radius:25px;
  cursor:pointer;
}

#yesBtn{
  background:#ff4d6d;
  color:white;
}

#noBtn{
  background:#444;
  color:white;
  position:absolute;
}

p{
  color:white;
  font-size:28px;
  margin-top:30px;
}

/* floating hearts */

.heart{
  position: fixed;
  bottom:-10px;
  font-size:20px;
  animation: float 6s linear infinite;
  color:red;
}

@keyframes float{
  0%{
    transform: translateY(0);
    opacity:1;
  }
  100%{
    transform: translateY(-100vh);
    opacity:0;
  }
}

</style>

</head>

<body>

<h1>Dummyyy, be with me forever? ❤️</h1>

<button id="yesBtn" onclick="yes()">Yes</button>
<button id="noBtn" onmouseover="moveButton()">No</button>

<p id="answer"></p>

<script>

/* YES button message */

function yes(){
  document.getElementById("answer").innerHTML = "YAYYY!! I knew it ❤️❤️❤️";
}

/* NO button runs away */

function moveButton(){

  let btn = document.getElementById("noBtn");

  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

/* floating hearts generator */

setInterval(function(){

  let heart = document.createElement("div");
  heart.classList.add("heart");

  heart.innerHTML="❤️";

  heart.style.left = Math.random()*100 + "vw";
  heart.style.fontSize = (Math.random()*20+10) + "px";

  document.body.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },6000);

},300);

</script>

</body>
</html>
